# User operations for Foris app

# Get user profile
query GetUser($id: String!) {
  user(id: $id) {
    id
    name
    email
    bio
    avatarUrl
  }
}

# Update user profile
mutation UpdateUser($input: UpdateUserInput!) {
  updateUser(updateUserInput: $input) {
    id
    name
    email
    bio
    avatarUrl
  }
}

# Follow a user
mutation FollowUser($targetUserId: String!) {
  followUser(targetUserId: $targetUserId)
}

# Unfollow a user
mutation UnfollowUser($targetUserId: String!) {
  unfollowUser(targetUserId: $targetUserId)
}

# Get followers
query GetFollowers($userId: String!) {
  getFollowers(userId: $userId) {
    id
    name
    email
    avatarUrl
  }
}

# Get following
query GetFollowing($userId: String!) {
  getFollowing(userId: $userId) {
    id
    name
    email
    avatarUrl
  }
}

# Get follower count
query GetFollowerCount($userId: String!) {
  getFollowerCount(userId: $userId)
}

# Get following count
query GetFollowingCount($userId: String!) {
  getFollowingCount(userId: $userId)
}

# Check if following a user
query IsFollowing($targetUserId: String!) {
  isFollowing(targetUserId: $targetUserId)
}