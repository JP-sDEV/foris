# Like operations for Foris app

# Get like by ID
query GetLike($id: String!) {
  like(id: $id) {
    postId
    userId
    user {
      id
      name
      avatarUrl
    }
    post {
      id
      title
    }
  }
}

# Like a post
mutation LikePost($input: CreateLikeInput!) {
  createLike(createLikeInput: $input) {
    postId
    userId
    user {
      id
      name
    }
    post {
      id
      title
    }
  }
}

# Unlike a post
mutation UnlikePost($id: String!) {
  removeLike(id: $id) {
    postId
    userId
  }
}