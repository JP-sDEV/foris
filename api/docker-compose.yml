version: '3.8'

services:
  db:
    image: postgres:latest
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=nestjs

  oauth:
    build:
      context: ./oauth-mock-server
    ports:
      - '8080:8080'

    volumes:
      - ./oauth-mock-server:/app
